# Alembic konfiguratsiya fayli
# Migration buyruqlari: alembic revision --autogenerate -m "msg"
#                       alembic upgrade head

[alembic]
# Migration skriptlar joylashuvi
script_location = alembic

# Migration fayllari nomi formati
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone
timezone = UTC

# Ma'lumotlar bazasi URL — env.py da dinamik o'rnatiladi
# Bu yerda bo'sh qoldiriladi, env.py dan o'qiladi
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
