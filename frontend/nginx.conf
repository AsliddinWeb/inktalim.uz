# Nginx konfiguratsiyasi — Vue3 SPA uchun
# Barcha yo'llar index.html ga yo'naltiriladi (client-side routing uchun)

server {
    listen 80;
    server_name localhost;

    # Statik fayllar joylashuvi
    root /usr/share/nginx/html;
    index index.html;

    # Gzip siqish (tezlik uchun)
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # API so'rovlarni backend ga proxy
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # Media fayllar backend dan
    location /media/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Vue Router uchun — barcha yo'llarni index.html ga yuborish
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik asset larga kesh (1 yil)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Xavfsizlik headerlari
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
