# ============================================================
# Nginx reverse proxy — inktalim.asliddin.me + inktalim.uz
# Serverda: /etc/nginx/sites-available/inktalim.conf
# Faollashtirish: sudo ln -s /etc/nginx/sites-available/inktalim.conf /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d inktalim.asliddin.me -d www.inktalim.asliddin.me -d inktalim.uz -d www.inktalim.uz
# ============================================================

# ── HTTP → HTTPS redirect (barcha domenlar) ─────────────────────────────────
server {
    listen 80;
    server_name inktalim.asliddin.me www.inktalim.asliddin.me inktalim.uz www.inktalim.uz;
    return 301 https://$host$request_uri;
}

# ── www → non-www redirect (asliddin.me) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.inktalim.asliddin.me;

    ssl_certificate     /etc/letsencrypt/live/inktalim.asliddin.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktalim.asliddin.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://inktalim.asliddin.me$request_uri;
}

# ── www → non-www redirect (inktalim.uz) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.inktalim.uz;

    ssl_certificate     /etc/letsencrypt/live/inktalim.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktalim.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://inktalim.uz$request_uri;
}

# ── inktalim.asliddin.me (asosiy) ────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inktalim.asliddin.me;

    ssl_certificate     /etc/letsencrypt/live/inktalim.asliddin.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktalim.asliddin.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # API so'rovlari → backend:8011
    location /api/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Media fayllar → backend:8011
    location /media/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_valid  200 1d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Qolgan hammasi → Vue frontend:3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── inktalim.uz (asosiy) ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inktalim.uz;

    ssl_certificate     /etc/letsencrypt/live/inktalim.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inktalim.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # API so'rovlari → backend:8011
    location /api/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Media fayllar → backend:8011
    location /media/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_valid  200 1d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Qolgan hammasi → Vue frontend:3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
